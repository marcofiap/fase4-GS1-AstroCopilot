# AstroCopilot — sobe backend + dashboard com um comando (Frente 5 / DevOps)
# Uso:  docker compose up --build
#   Dashboard: http://localhost:5173
#   Backend:   http://localhost:8000/docs

services:
  backend:
    build: ./backend
    container_name: astrocopilot-backend
    ports:
      - "8000:8000"
    # Persiste o SQLite (alertas + auditoria) fora do container
    volumes:
      - backend-data:/app/data
      # Frente 1: codigo do agente + base vetorial (gerada localmente pelo ingest)
      - ./agent-rag:/app/agent-rag
      # Frente 2: pipeline de voz (STT/TTS)
      - ./voice-nlp:/app/voice-nlp
    environment:
      - AGENT_RAG_DIR=/app/agent-rag
      - VOICE_NLP_DIR=/app/voice-nlp
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_BEARER_TOKEN_BEDROCK=${AWS_BEARER_TOKEN_BEDROCK:-}
      - BEDROCK_MODEL_ID=${BEDROCK_MODEL_ID:-us.anthropic.claude-haiku-4-5-20251001-v1:0}
      - BEDROCK_EMBED_MODEL_ID=${BEDROCK_EMBED_MODEL_ID:-amazon.titan-embed-text-v2:0}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3

  dashboard:
    build:
      context: ./dashboard
      args:
        # O navegador acessa o backend pelo host, então localhost funciona.
        VITE_API_URL: http://localhost:8000
        VITE_WS_URL: ws://localhost:8000
    container_name: astrocopilot-dashboard
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
