name: CI

# Valida backend e dashboard a cada push/PR na main (Frente 5 / DevOps)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instala dependências
        run: pip install -r requirements.txt

      - name: Checa sintaxe (compila todos os módulos)
        run: python -m compileall -q .

      - name: Smoke test (importa a app e valida classify_risk)
        run: |
          python -c "import main; assert main.classify_risk(hr=160, spo2=85, temp=39) == 'risco'; assert main.classify_risk(hr=72, spo2=98, temp=36.5) == 'normal'; print('OK')"

  dashboard:
    name: Dashboard (React + Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Instala dependências
        run: npm ci

      - name: Build de produção
        run: npm run build
