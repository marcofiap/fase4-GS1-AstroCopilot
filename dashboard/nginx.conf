server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: rotas do react-router (/visao, /alertas) caem no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agressivo dos assets versionados (hash no nome do arquivo)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
