; PlatformIO — firmware do wearable ESP32 (Frente 4 / AstroCopilot).
; Base: projetos PlatformIO+Wokwi de Config_Luiz. Docs: https://docs.platformio.org/page/projectconf.html
;
; Build:  pio run                 (compila p/ .pio/build/esp32doit-devkit-v1/)
; Wokwi:  a extensão lê o .bin/.elf via wokwi.toml. Ctrl+Shift+P > "Wokwi: Start Simulator".
;
; board = esp32doit-devkit-v1 casa com o diagram.json (wokwi-esp32-devkit-v1).

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit MPU6050
    adafruit/Adafruit Unified Sensor
    adafruit/Adafruit BusIO
    paulstoffregen/OneWire
    milesburton/DallasTemperature
